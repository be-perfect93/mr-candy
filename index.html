<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Candy Dash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#1a0535;color:#fff;font-family:'Arial Rounded MT Bold',Arial,sans-serif;user-select:none;overflow-x:hidden;overflow-y:auto}
canvas#S{position:fixed;inset:0;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100%;padding:8px 8px 14px;gap:6px;box-sizing:border-box}
#inner{display:flex;flex-direction:column;align-items:center;width:100%;max-width:460px;gap:6px}
#hdr{display:flex;justify-content:space-between;align-items:center;width:100%}
#logo{font-size:clamp(16px,2.8vh,26px);font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,#c084fc,#f472b6,#facc15);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:4px 13px;font-size:13px;font-weight:700}
#bal{color:#6ee7b7}
#hist{width:100%;display:flex;gap:4px;overflow:hidden}
.hp{flex:0 0 calc((100% - 20px)/6);border-radius:5px;padding:3px 2px;text-align:center;font-size:9px;font-weight:900;min-height:20px;display:flex;align-items:center;justify-content:center;animation:slideInR .22s ease-out}
@keyframes slideInR{from{transform:translateX(28px);opacity:0}to{transform:translateX(0);opacity:1}}
.hw{background:rgba(5,150,105,.25);color:#34d399;border:1px solid rgba(52,211,153,.3)}
.hb{background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.1)}
/* Reel */
#rw{width:100%;background:rgba(0,0,0,.45);border:1.5px solid rgba(100,100,255,.3);border-radius:13px;padding:9px;display:flex;flex-direction:column;min-height:68px}
#reel-wrap{flex:1;position:relative;min-height:50px}
#rvp{position:absolute;inset:0;overflow:hidden;border-radius:8px}
#rvp::before,#rvp::after{content:'';position:absolute;top:0;bottom:0;width:18px;z-index:2;pointer-events:none}
#rvp::before{left:0;background:linear-gradient(to right,rgba(0,0,0,.9),transparent)}
#rvp::after{right:0;background:linear-gradient(to left,rgba(0,0,0,.9),transparent)}
#rhl{position:absolute;top:0;left:50%;transform:translateX(-50%);border:1.5px solid rgba(251,191,36,.38);border-radius:8px;z-index:3;pointer-events:none}
#rtk{display:flex;position:absolute;top:50%;left:0;transform:translateY(-50%)}
.ri{flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:3px}
.rn{font-size:6px;color:rgba(255,255,255,.3);text-transform:uppercase;text-align:center}
.mg{display:grid;grid-template-columns:repeat(7,5px);grid-template-rows:repeat(7,5px);gap:1px}
.mc{width:5px;height:5px;border-radius:1px;background:#18223a}
.bc{background:#3b82f6}
/* Door */
#door{position:absolute;inset:0;display:flex;border-radius:8px;overflow:hidden;z-index:5;pointer-events:none}
#door-l,#door-r{flex:1;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(180deg,#1c0040,#2e0858,#1c0040);transition:transform .38s cubic-bezier(.4,0,.2,1)}
#door-l{border-right:1.5px solid rgba(160,60,255,.5)}
#rw:not(.door-open) #door-l,#rw:not(.door-open) #door-r{animation:dpulse 1.5s ease-in-out infinite}
@keyframes dpulse{0%,100%{box-shadow:inset 0 0 8px rgba(160,60,255,.1)}50%{box-shadow:inset 0 0 20px rgba(160,60,255,.38)}}
#rw.door-open #door-l{transform:translateX(-100%)}
#rw.door-open #door-r{transform:translateX(100%)}
/* Grid */
#gw{width:100%;background:linear-gradient(135deg,rgba(90,0,180,.35),rgba(30,0,80,.6));border:2.5px solid rgba(160,60,255,.45);border-radius:18px;padding:9px;box-shadow:0 0 50px rgba(140,0,255,.3),inset 0 0 25px rgba(0,0,0,.35);overflow:hidden;position:relative}
#gd{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.c{aspect-ratio:1;border-radius:10px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:default}
.ct0{background:repeating-linear-gradient(0deg,rgba(255,255,255,0) 0px,rgba(255,255,255,0) 5px,rgba(255,255,255,.13) 5px,rgba(255,255,255,.13) 7px),radial-gradient(circle at 52% 48%,#3dd8ff,#09b8f5,#0099dd);box-shadow:0 3px 0 #0077aa,inset 0 1px 0 rgba(255,255,255,.22)}
.ct0::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38%;height:38%;border-radius:50%;background:rgba(255,255,255,.18);filter:blur(3px);pointer-events:none;z-index:1}
.ct0::after{content:'';position:absolute;top:9%;left:11%;width:28%;height:22%;background:rgba(255,255,255,.38);border-radius:50%;filter:blur(2px);pointer-events:none;z-index:1}
.ct1{background:linear-gradient(145deg,#ffe066,#ffbb00,#cc8800);box-shadow:0 4px 0 #775500,inset 0 2px 0 rgba(255,255,255,.35)}
.ct2{background:linear-gradient(145deg,#77ff99,#11cc44,#008833);box-shadow:0 4px 0 #005522,inset 0 2px 0 rgba(255,255,255,.35)}
.ct3{background:linear-gradient(145deg,#ff8899,#ff1144,#bb0033);box-shadow:0 4px 0 #880022,inset 0 2px 0 rgba(255,255,255,.35)}
.ct4{background:linear-gradient(145deg,#dd88ff,#9922ff,#6600cc);box-shadow:0 4px 0 #440077,inset 0 2px 0 rgba(255,255,255,.35)}
.ct5{background:linear-gradient(145deg,#ffe060,#ffa000,#dd5500);box-shadow:0 4px 0 #993300,inset 0 2px 0 rgba(255,255,255,.35),0 0 14px rgba(255,160,0,.4)}
.ct6{background:linear-gradient(145deg,#ffd6eb,#ff69b4,#c2006e);box-shadow:0 4px 0 #830049,inset 0 2px 0 rgba(255,255,255,.55),0 0 18px rgba(255,105,180,.45);animation:sweetidle 1.7s ease-in-out infinite}
@keyframes sweetidle{0%,100%{box-shadow:0 4px 0 #830049,inset 0 2px 0 rgba(255,255,255,.55),0 0 12px rgba(255,105,180,.35)}50%{box-shadow:0 4px 0 #830049,inset 0 2px 0 rgba(255,255,255,.55),0 0 30px rgba(255,105,180,.85)}}
.ct6::before{content:'';position:absolute;inset:0;border-radius:10px;border:1.5px solid rgba(255,255,255,.5);animation:swbdr 1.3s linear infinite;pointer-events:none;z-index:3}
@keyframes swbdr{0%{box-shadow:inset 0 0 0 transparent}40%{box-shadow:inset 0 0 10px rgba(255,255,255,.25)}70%{box-shadow:inset 0 0 14px rgba(255,200,230,.35)}100%{box-shadow:inset 0 0 0 transparent}}
.ct6::after{content:'';position:absolute;top:7%;left:10%;width:32%;height:26%;background:rgba(255,255,255,.68);border-radius:50%;filter:blur(2px);pointer-events:none;z-index:1}
.ct1::after,.ct2::after,.ct3::after,.ct4::after,.ct5::after{content:'';position:absolute;top:9%;left:11%;width:30%;height:24%;background:rgba(255,255,255,.5);border-radius:50%;filter:blur(2px);pointer-events:none;z-index:1}
.sw-s1,.sw-s2,.sw-s3{position:absolute;pointer-events:none;z-index:4;color:#fff;line-height:1}
.sw-s1{top:2px;right:3px;font-size:clamp(5px,1.8vw,8px);animation:spk .9s ease-in-out infinite}
.sw-s2{bottom:2px;left:2px;font-size:clamp(4px,1.4vw,6px);animation:spk .9s ease-in-out .32s infinite}
.sw-s3{top:50%;right:2px;font-size:clamp(3px,1.1vw,5px);transform:translateY(-50%);animation:spk .9s ease-in-out .63s infinite}
@keyframes spk{0%,100%{opacity:.25;transform:scale(.6)}50%{opacity:1;transform:scale(1.4)}}
.sweet-lbl{font-size:clamp(5px,1.5vw,7.5px);font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9),0 0 6px rgba(255,20,147,.6);z-index:5;text-align:center;line-height:1.25;display:flex;flex-direction:column;align-items:center;gap:1px}
.ca.ct6{animation:sweetclick .6s ease-in-out infinite!important}
@keyframes sweetclick{0%,100%{transform:scale(1) translateY(0);box-shadow:0 4px 0 #830049,0 0 20px rgba(255,105,180,.5)}50%{transform:scale(1.1) translateY(-3px);filter:brightness(1.5);box-shadow:0 4px 0 #830049,0 0 40px rgba(255,20,147,.95)}}
.gm{width:42%;height:42%;position:absolute;border-radius:5px;transform:rotate(45deg);background:rgba(255,255,255,.25);box-shadow:inset 0 2px 5px rgba(255,255,255,.55),inset 0 -2px 4px rgba(0,0,0,.2);z-index:2}
.cm-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(9px,2.3vw,13px);font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);z-index:7;text-align:center;white-space:nowrap;line-height:1}
.mult-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(13px,4vw,20px);font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.9),0 0 12px rgba(180,80,255,.6);z-index:7;white-space:nowrap;letter-spacing:1px}
.scatter-lbl{font-size:clamp(5px,1.5vw,7.5px);font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);z-index:3;text-align:center;line-height:1.25;display:flex;flex-direction:column;align-items:center;gap:1px}
#move-hint{position:absolute;top:8px;left:50%;transform:translateX(-50%);white-space:nowrap;z-index:15;font-size:clamp(9px,2.5vw,11px);font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#ffe566;padding:4px 14px;background:rgba(0,0,20,.75);border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s}
#move-hint.show{opacity:1;animation:hintblink .55s ease-in-out infinite}
#move-hint.show::before{content:'\25B6\0020'}
@keyframes hintblink{0%,100%{opacity:.5}50%{opacity:1}}
.ca{cursor:pointer!important;box-shadow:0 0 0 2.5px #ffe000,0 0 12px rgba(255,220,0,.55),inset 0 0 8px rgba(255,220,0,.15)!important;filter:brightness(1.18)!important;animation:capulse .8s ease-in-out infinite!important}
@keyframes capulse{0%,100%{box-shadow:0 0 0 2.5px #ffe000,0 0 10px rgba(255,220,0,.45)!important}50%{box-shadow:0 0 0 3px #ffe000,0 0 22px rgba(255,220,0,.8)!important}}
.ca:hover{transform:scale(1.12) translateY(-3px)!important;filter:brightness(1.55)!important;box-shadow:0 0 0 3px #fff700,0 0 28px rgba(255,230,0,.9)!important;animation:none!important;transition:transform .1s,filter .1s!important}
.cd{background:radial-gradient(circle at 44% 36%,#ffe8f0,#ff8fab,#d6004a)!important;box-shadow:0 4px 0 #8c0032,0 0 0 2.5px rgba(255,180,205,.75),0 0 22px rgba(255,70,120,.7),inset 0 2px 0 rgba(255,255,255,.55)!important;border-radius:50%!important;overflow:visible!important;z-index:5;animation:cdring .84s ease-in-out infinite!important}
@keyframes cdring{0%,100%{box-shadow:0 4px 0 #8c0032,0 0 0 2px rgba(255,180,205,.55),0 0 16px rgba(255,70,120,.55),inset 0 2px 0 rgba(255,255,255,.55)}50%{box-shadow:0 4px 0 #8c0032,0 0 0 5px rgba(255,180,205,.85),0 0 36px rgba(255,70,120,.95),inset 0 2px 0 rgba(255,255,255,.55)}}
.di{font-size:clamp(26px,8.5vw,42px)!important;animation:mousequake .6s ease-in-out infinite;z-index:3;filter:drop-shadow(0 2px 6px rgba(0,0,0,.55));line-height:1}
@keyframes mousequake{0%,100%{transform:scale(1) rotate(-4deg) translateY(0)}22%{transform:scale(1.2) rotate(5deg) translateY(-4px)}45%{transform:scale(1.13) rotate(-3deg) translateY(-5px)}68%{transform:scale(1.15) rotate(4deg) translateY(-3px)}85%{transform:scale(1.07) rotate(-1deg) translateY(-1px)}}
.cb{background:linear-gradient(145deg,#0a0000,#2a0000)!important;box-shadow:inset 0 3px 8px rgba(0,0,0,.95)!important}
.bi{font-size:clamp(12px,4vw,20px);z-index:3}
.cpb{background:linear-gradient(145deg,#5a0000,#b00000)!important;box-shadow:0 4px 0 #400000,0 0 18px rgba(255,60,0,.7)!important;animation:arm .28s ease-out!important}
@keyframes arm{0%{transform:scale(.5);opacity:.4}65%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes efx{0%{background:#fffde7!important;transform:scale(1.45);box-shadow:0 0 25px #fff!important}30%{background:#ff8800!important;transform:scale(1.2)}100%{background:linear-gradient(145deg,#0a0000,#2a0000)!important;transform:scale(1)}}
.efx{animation:efx .28s ease-out forwards!important;z-index:10!important}
.cs::before{content:'';position:absolute;inset:0;border-radius:10px;border:2.5px solid #fff;animation:spb .42s ease-in-out infinite;z-index:6;pointer-events:none}
@keyframes spb{0%,100%{border-color:#fff}50%{border-color:#ffd700}}
@keyframes shk{0%,100%{transform:translate(0,0)}8%{transform:translate(-8px,-3px)}16%{transform:translate(8px,3px)}24%{transform:translate(-6px,2px)}32%{transform:translate(6px,-2px)}40%{transform:translate(-4px,2px)}50%{transform:translate(4px,-2px)}60%{transform:translate(-3px,1px)}70%{transform:translate(3px,-1px)}80%{transform:translate(-2px,0)}90%{transform:translate(1px,0)}}
.shaking{animation:shk .42s ease-out}
@keyframes wbounce{0%{transform:scale(1)}25%{transform:scale(1.35)}60%{transform:scale(.95)}100%{transform:scale(1)}}
.win-bounce{animation:wbounce .35s ease-out}
@keyframes winflash{0%{color:#fff;text-shadow:0 0 22px #6ee7b7,0 0 40px rgba(110,231,183,.55);transform:scale(1.3)}65%{color:#6ee7b7;transform:scale(1.05)}100%{color:#6ee7b7;transform:scale(1)}}
.win-flash{animation:winflash .22s ease-out forwards!important}
#gw.spin-border{animation:spinglow .22s linear infinite!important}
@keyframes spinglow{
  0%  {border-color:#ff3366;box-shadow:0 0 55px rgba(255,51,102,.7),inset 0 0 25px rgba(0,0,0,.35)}
  14% {border-color:#ff8800;box-shadow:0 0 55px rgba(255,136,0,.7),inset 0 0 25px rgba(0,0,0,.35)}
  28% {border-color:#ffee00;box-shadow:0 0 55px rgba(255,238,0,.7),inset 0 0 25px rgba(0,0,0,.35)}
  42% {border-color:#44ff88;box-shadow:0 0 55px rgba(68,255,136,.7),inset 0 0 25px rgba(0,0,0,.35)}
  57% {border-color:#00ccff;box-shadow:0 0 55px rgba(0,204,255,.7),inset 0 0 25px rgba(0,0,0,.35)}
  71% {border-color:#8844ff;box-shadow:0 0 55px rgba(136,68,255,.7),inset 0 0 25px rgba(0,0,0,.35)}
  85% {border-color:#ff44cc;box-shadow:0 0 55px rgba(255,68,204,.7),inset 0 0 25px rgba(0,0,0,.35)}
  100%{border-color:#ff3366;box-shadow:0 0 55px rgba(255,51,102,.7),inset 0 0 25px rgba(0,0,0,.35)}
}
#mw{width:100%;display:flex;gap:7px}
.mp{flex:1;background:rgba(0,0,0,.4);border:1.5px solid rgba(100,100,255,.25);border-radius:11px;padding:12px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
.mlb{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.75);margin-bottom:4px}
#win-amt{font-size:30px;font-weight:900;color:#6ee7b7;line-height:1.1}
#scatter-disp{font-size:24px;font-weight:700;color:#ffd700}
#prb{display:flex;gap:5px;margin-top:4px;justify-content:center}
.pp{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);transition:background .3s}
.pp.on{background:#ffd700;box-shadow:0 0 6px rgba(255,215,0,.7);border-color:#ffd700}
#cw{width:100%;background:rgba(0,0,0,.38);border:1.5px solid rgba(100,100,255,.22);border-radius:13px;padding:10px;display:flex;flex-direction:column;gap:7px}
#brow{display:flex;align-items:center;gap:8px}
.ba{width:34px;height:34px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ba:hover{background:rgba(255,255,255,.16)}
#bval{flex:1;text-align:center;font-size:20px;font-weight:900}
/* Difficulty dropdown */
#diff-wrap{position:relative;display:inline-block}
#diff-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:8px;color:#fff;font-size:12px;font-weight:900;padding:0 10px;height:30px;cursor:pointer;letter-spacing:.5px;white-space:nowrap;transition:background .12s}
#diff-btn:hover{background:rgba(255,255,255,.16)}
#diff-btn .diff-arrow{font-size:9px;opacity:.7;transition:transform .2s}
#diff-wrap.open #diff-btn .diff-arrow{transform:rotate(180deg)}
#diff-menu{display:none;position:absolute;bottom:calc(100% + 5px);left:0;min-width:100%;background:#1e0848;border:1px solid rgba(160,60,255,.4);border-radius:10px;overflow:hidden;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#diff-wrap.open #diff-menu{display:block}
.diff-opt{width:100%;padding:8px 14px;text-align:left;background:none;border:none;color:#fff;font-size:12px;font-weight:900;cursor:pointer;letter-spacing:.5px;transition:background .1s}
.diff-opt:hover{background:rgba(255,255,255,.1)}
.diff-opt.active{color:#6ee7b7}
.diff-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
.diff-opt[data-d="easy"] .diff-dot{background:#6ee7b7}
.diff-opt[data-d="medium"] .diff-dot{background:#fcd34d}
.diff-opt[data-d="hard"] .diff-dot{background:#f87171}
/* Quick bet bar */
#qbrow{display:flex;align-items:center;gap:5px}
.qb{flex:1;height:30px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:rgba(255,255,255,.85);font-size:12px;font-weight:900;cursor:pointer;letter-spacing:.5px;transition:background .12s,transform .08s;display:flex;align-items:center;justify-content:center}
.qb:hover{background:rgba(255,255,255,.17);transform:translateY(-1px)}
.qb:active{transform:scale(.96)}
.qb.qb-min{color:#6ee7b7;border-color:rgba(110,231,183,.3)}
.qb.qb-max{color:#f472b6;border-color:rgba(244,114,182,.3)}
.qb.qb-half{color:#fcd34d;border-color:rgba(252,211,77,.25)}
.qb.qb-dbl{color:#a78bfa;border-color:rgba(167,139,250,.25)}
#btnM{background:linear-gradient(155deg,#3b70f8,#1a4bcc);border:none;border-radius:11px;color:#fff;font-size:15px;font-weight:900;padding:12px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;width:100%;box-shadow:0 4px 0 #102a99;transition:transform .1s}
#btnM:hover{transform:translateY(-2px)}
#btnM.co{background:linear-gradient(155deg,#05a870,#037050);box-shadow:0 4px 0 #024d35}
#btnM:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:99;opacity:0;pointer-events:none;transition:opacity .3s}
#ov.show{opacity:1;pointer-events:all}
#ovb{background:linear-gradient(155deg,#220850,#0e031f);border:1.5px solid rgba(255,255,255,.14);border-radius:20px;padding:28px 36px;text-align:center;max-width:300px;width:90%}
#ovt{font-size:32px;font-weight:900;margin-bottom:6px;color:#6ee7b7}
#ovs{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:4px}
#ova{font-size:26px;font-weight:900;margin-bottom:18px;color:#6ee7b7}
#ovc{background:linear-gradient(155deg,#3b70f8,#1a4bcc);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:900;padding:10px 26px;cursor:pointer;text-transform:uppercase;letter-spacing:2px}
*{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media(max-width:480px){
  html,body{overflow-y:auto}
  #app{padding:4px 4px 8px;gap:3px}
  #inner{gap:3px}
  .pill{font-size:11px;padding:3px 9px}
  .hp{min-height:16px;font-size:8px}
  #rw{padding:6px;border-radius:10px;min-height:62px}
  #rlb{font-size:7px}
  #gw{padding:5px;border-radius:13px;border-width:2px}
  #gd{gap:2px}
  .c{border-radius:7px}
  #mw{gap:4px}
  .mp{padding:8px 5px;border-radius:9px}
  .mlb{font-size:8px;margin-bottom:2px}
  #win-amt{font-size:24px}
  #scatter-disp{font-size:18px}
  .pp{width:8px;height:8px}
  #prb{margin-top:2px;gap:4px}
  #cw{padding:7px;gap:4px}
  .ba{width:38px;height:38px;font-size:20px}
  #bval{font-size:16px}
  .qb{height:26px;font-size:11px}
  #btnM{padding:11px;font-size:13px}
  #ovb{padding:22px 24px}
  #ovt{font-size:26px}
  #ova{font-size:22px;margin-bottom:14px}
}
@media(max-width:360px){
  #app{padding:3px 3px 6px;gap:2px}
  #inner{gap:2px}
  .mp{padding:6px 4px}
  #win-amt{font-size:20px}
  #scatter-disp{font-size:15px}
  .ba{width:30px;height:30px;font-size:16px}
  .qb{height:24px;font-size:10px}

<script>
(function(){

var E={mouse:'\uD83D\uDC2D',bomb:'\uD83D\uDCA3',explode:'\uD83D\uDCA5',crystal:'\uD83D\uDD2E',sweet:'\uD83C\uDF6D',heart:'\uD83D\uDC97',star:'\u2726'};

  {n:'Dbl.Col',c:[[0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[0,4],[1,4],[2,4],[3,4],[4,4],[5,4],[6,4]]}
];

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);})}

var _dt=null;

var RL=56,IW=60,rArr=[],rX=0;
function buildReel(){
  rArr=[];for(var i=0;i<RL;i++)rArr.push(i%SYM.length);
  for(var i=rArr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=rArr[i];rArr[i]=rArr[j];rArr[j]=t;}
  renderReelDOM();setReel(5);
}
function renderReelDOM(){
  var tk=document.getElementById('rtk');tk.innerHTML='';tk.style.width=(rArr.length*IW)+'px';
  for(var idx=0;idx<rArr.length;idx++){
    var si=rArr[idx],bm={};
    for(var k=0;k<SYM[si].c.length;k++){var rc=SYM[si].c[k];bm[rc[0]+','+rc[1]]=1;}
    var item=document.createElement('div');item.className='ri';
    item.style.width=IW+'px';item.style.height='50px';
    var mg=document.createElement('div');mg.className='mg';
    for(var r=0;r<7;r++)for(var c=0;c<7;c++){
      var mc=document.createElement('div');mc.className='mc';
      if(bm[r+','+c])mc.classList.add('bc');
      mg.appendChild(mc);
    }
    item.appendChild(mg);tk.appendChild(item);
  }
}
function setReel(idx){var vp=document.getElementById('rvp'),vpW=vp.clientWidth||320;rX=vpW/2-IW/2-idx*IW;document.getElementById('rtk').style.transform='translateX('+rX+'px) translateY(-50%)';}
function spinReel(ts){
  return new Promise(function(res){
    var lp=38+Math.floor(Math.random()*12);rArr[lp]=ts;
    if(lp>0&&rArr[lp-1]===ts)rArr[lp-1]=(ts+3)%SYM.length;
    if(lp<rArr.length-1&&rArr[lp+1]===ts)rArr[lp+1]=(ts+5)%SYM.length;
    renderReelDOM();setReel(5);
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      var vp=document.getElementById('rvp'),vpW=vp.clientWidth||320;
      var sx=rX,ex=vpW/2-IW/2-lp*IW,dur=1400,t0=null,trk=document.getElementById('rtk');
      function step(ts2){if(!t0)t0=ts2;var p=Math.min((ts2-t0)/dur,1),e=1-Math.pow(1-p,4);trk.style.transform='translateX('+(sx+(ex-sx)*e)+'px) translateY(-50%)';if(p<1)requestAnimationFrame(step);else{rX=ex;res();}}
      requestAnimationFrame(step);
    });});
  });
}

var CELL_RATIOS=[{ct:'empty',r:0.45},{ct:'cash_low',r:0.10},{ct:'cash_mid',r:0.08},{ct:'cash_high',r:0.02},{ct:'purple',r:0.20},{ct:'scatter',r:0.05},{ct:'sweet',r:0.10}];
function randPurpleVal(){var r=Math.random();if(r<.30)return 1.2;if(r<.55)return 1.5;if(r<.75)return 2;if(r<.87)return 3;if(r<.95)return 4;return 5;}
function makeTypedCell(ct){
  if(ct==='cash_low') return{s:'h',ct:'cash_low', val:Math.random()<0.6?0.5:0.7};
  if(ct==='cash_mid') return{s:'h',ct:'cash_mid', val:Math.random()<0.55?0.8:1.0};
  if(ct==='cash_high')return{s:'h',ct:'cash_high',val:Math.random()<0.7?1.5:2.0};
  if(ct==='purple')   return{s:'h',ct:'purple',   val:randPurpleVal()};
  if(ct==='scatter')  return{s:'h',ct:'scatter',  val:null};
  if(ct==='sweet')    return{s:'h',ct:'sweet',    val:null};
  return{s:'h',ct:'empty',val:null};
}
function makeCellPool(n){
  if(n<=0)return[];
  var pool=[],rem=n;
  for(var i=0;i<CELL_RATIOS.length;i++){var cnt=(i===CELL_RATIOS.length-1)?rem:Math.min(rem,Math.round(n*CELL_RATIOS[i].r));for(var j=0;j<cnt;j++)pool.push(makeTypedCell(CELL_RATIOS[i].ct));rem-=cnt;}
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=pool[i];pool[i]=pool[j];pool[j]=t;}
  return pool;
}
function newGrid(){
  var pool=makeCellPool(GS*GS);G.grid=[];
  for(var r=0;r<GS;r++){G.grid[r]=[];for(var c=0;c<GS;c++)G.grid[r][c]=pool[r*GS+c];}
  G.grid[DS.r][DS.c].s='r';
}
function getAdj(r,c){
  var a=[];for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;var nr=r+dr,nc=c+dc;if(nr>=0&&nr<GS&&nc>=0&&nc<GS&&G.grid[nr][nc].s==='h')a.push([nr,nc]);}return a;
}
function getDeerNewRow(bs,r,c){var b=0;for(var row=r+1;row<GS;row++)if(bs[row+','+c])b++;return Math.min(GS-1,r+b);}
function applyGravityToGrid(bs){
  var totalNew=0,npc=[];
  for(var col=0;col<GS;col++){var cnt=0;for(var row=0;row<GS;row++)if(bs[row+','+col])cnt++;npc.push(cnt);totalNew+=cnt;}
  var pool=makeCellPool(totalNew),pidx=0;
  for(var col=0;col<GS;col++){
    var surv=[];for(var row=0;row<GS;row++){if(!bs[row+','+col]){var g=G.grid[row][col];surv.push({s:g.s,ct:g.ct,val:g.val});}}
    var numNew=GS-surv.length;
    for(var row=0;row<GS;row++){if(row<numNew)G.grid[row][col]=pool[pidx++];else G.grid[row][col]=surv[row-numNew];}
  }
}

function render(){
  var gel=document.getElementById('gd');gel.innerHTML='';
  var adj=getAdj(G.deer.r,G.deer.c),as={};for(var ai=0;ai<adj.length;ai++)as[adj[ai][0]+','+adj[ai][1]]=1;
  for(var r=0;r<GS;r++){
    for(var c=0;c<GS;c++){
      var gs=G.grid[r][c],k=r+','+c,iD=(G.deer.r===r&&G.deer.c===c);
      var el=document.createElement('div');el.className='c';el.dataset.r=r;el.dataset.c=c;
      if(iD){
        el.classList.add('cd');var ic=document.createElement('span');ic.className='di';ic.textContent=E.mouse;el.appendChild(ic);
      } else if(gs.s==='b'){
        el.classList.add('cb');var ic=document.createElement('span');ic.className='bi';ic.textContent=E.explode;el.appendChild(ic);
      } else if(gs.s==='pb'){
        el.classList.add('cpb');var ic=document.createElement('span');ic.style.cssText='font-size:clamp(13px,4.5vw,22px);z-index:3';ic.textContent=E.bomb;el.appendChild(ic);
      } else {
        el.classList.add('ct'+(CTIDX[gs.ct]||0));
        if(G.phase==='playing'&&gs.s==='h'&&as[k]){el.classList.add('ca');(function(rr,cc){el.addEventListener('click',function(){onCell(rr,cc);});}(r,c));}
        if(gs.ct==='scatter'){
          var lbl=document.createElement('div');lbl.className='scatter-lbl';
          var a1=document.createElement('span');a1.textContent=E.crystal;var a2=document.createElement('span');a2.textContent='SCATTER';lbl.appendChild(a1);lbl.appendChild(a2);el.appendChild(lbl);
        } else if(gs.ct==='sweet'){
          var s1=document.createElement('span');s1.className='sw-s1';s1.textContent=E.star;el.appendChild(s1);
          var s2=document.createElement('span');s2.className='sw-s2';s2.textContent=E.star;el.appendChild(s2);
          var s3=document.createElement('span');s3.className='sw-s3';s3.textContent=E.star;el.appendChild(s3);
          var lbl=document.createElement('div');lbl.className='sweet-lbl';
          var a1=document.createElement('span');a1.textContent=E.sweet;a1.style.fontSize='clamp(10px,3vw,16px)';
          var a2=document.createElement('span');a2.textContent='SWEET';lbl.appendChild(a1);lbl.appendChild(a2);el.appendChild(lbl);
        } else {
          var isCash=(gs.ct==='cash_low'||gs.ct==='cash_mid'||gs.ct==='cash_high');
          if(isCash&&gs.val){var bd=document.createElement('div');bd.className='cm-center';bd.textContent='$'+Math.max(G.bet*gs.val,0.50).toFixed(2);el.appendChild(bd);}
          else{if(gs.ct!=='empty'){var gem=document.createElement('div');gem.className='gm';el.appendChild(gem);}if(gs.ct==='purple'&&gs.val){var bd=document.createElement('div');bd.className='mult-lbl';bd.textContent='x'+gs.val;el.appendChild(bd);}}
        }
      }
      if(G.sel&&G.sel.r===r&&G.sel.c===c)el.classList.add('cs');
      gel.appendChild(el);
    }
  }
}

function updateWinDisplay(bounce){
  document.getElementById('win-amt').textContent='$'+G.win.toFixed(2);
  if(bounce){var e=document.getElementById('win-amt');e.classList.remove('win-bounce');void e.offsetWidth;e.classList.add('win-bounce');}

function buildPips(){var b=document.getElementById('prb');b.innerHTML='';for(var i=0;i<1;i++){var d=document.createElement('div');d.className='pp';d.id='pp'+i;b.appendChild(d);}}
function renderHist(){

function ui(){
  document.getElementById('bal').textContent=G.bal.toFixed(2);

}

function animateDeer(fromR,fromC,toR,toC,dur){
  return new Promise(function(res){
    var gd=document.getElementById('gd');
    var fEl=gd.querySelector('[data-r="'+fromR+'"][data-c="'+fromC+'"]'),tEl=gd.querySelector('[data-r="'+toR+'"][data-c="'+toC+'"]');
    if(!fEl||!tEl){setTimeout(res,dur);return;}
    var fr=fEl.getBoundingClientRect(),tr=tEl.getBoundingClientRect();
    var sx=fr.left+fr.width/2,sy=fr.top+fr.height/2,ex=tr.left+tr.width/2,ey=tr.top+tr.height/2;
    var arc=Math.max(28,Math.sqrt((ex-sx)*(ex-sx)+(ey-sy)*(ey-sy))*0.6);
    var di=fEl.querySelector('.di');if(di)di.style.opacity='0';
    var ov=document.createElement('div');ov.style.cssText='position:fixed;z-index:200;pointer-events:none;font-size:clamp(16px,5.5vw,28px);transform:translate(-50%,-50%)';
    ov.textContent=E.mouse;ov.style.left=sx+'px';ov.style.top=sy+'px';document.body.appendChild(ov);
    var t0=null;
    function step(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1),ep=1-Math.pow(1-p,3);ov.style.left=(sx+(ex-sx)*ep)+'px';ov.style.top=((sy+(ey-sy)*ep)-arc*Math.sin(Math.PI*p))+'px';ov.style.transform='translate(-50%,-50%) scale('+(1+0.28*Math.sin(Math.PI*p))+')';if(p<1)requestAnimationFrame(step);else{if(ov.parentNode)ov.parentNode.removeChild(ov);res();}}
    requestAnimationFrame(step);
  });
}
function shakeScreen(){var inn=document.getElementById('inner');inn.classList.remove('shaking');void inn.offsetWidth;inn.classList.add('shaking');setTimeout(function(){inn.classList.remove('shaking');},455);}

function applySweetEffect(cb){
  var usdCells=[];
  for(var r=0;r<GS;r++)for(var c=0;c<GS;c++){var cell=G.grid[r][c];if((cell.ct==='cash_low'||cell.ct==='cash_mid'||cell.ct==='cash_high')&&cell.val!==null){cell.val=Math.round(cell.val*1.2*1000)/1000;usdCells.push([r,c]);}}
  var dEl=document.querySelector('#gd .cd');if(!dEl){render();setTimeout(cb,210);return;}
  var dr=dEl.getBoundingClientRect(),sx=dr.left+dr.width/2,sy=dr.top+dr.height/2;
  var burst=document.createElement('div');burst.style.cssText='position:fixed;left:'+sx+'px;top:'+sy+'px;z-index:170;pointer-events:none;transform:translate(-50%,-50%) scale(1);font-size:clamp(22px,8vw,40px);transition:transform .25s ease-out,opacity .18s ease .08s';burst.textContent=E.sweet;document.body.appendChild(burst);
  requestAnimationFrame(function(){requestAnimationFrame(function(){burst.style.transform='translate(-50%,-50%) scale(2.5)';burst.style.opacity='0';});});
  setTimeout(function(){if(burst.parentNode)burst.parentNode.removeChild(burst);},350);
  var ring=document.createElement('div');ring.style.cssText='position:fixed;left:'+sx+'px;top:'+sy+'px;z-index:169;pointer-events:none;transform:translate(-50%,-50%) scale(0);width:60px;height:60px;border-radius:50%;border:3px solid rgba(255,105,180,.9);transition:transform .35s ease-out,opacity .21s ease .14s';document.body.appendChild(ring);
  requestAnimationFrame(function(){requestAnimationFrame(function(){ring.style.transform='translate(-50%,-50%) scale(4)';ring.style.opacity='0';});});
  setTimeout(function(){if(ring.parentNode)ring.parentNode.removeChild(ring);},420);
  if(!usdCells.length){setTimeout(function(){render();cb();},420);return;}
  var gd=document.getElementById('gd'),emos=[E.heart,E.sweet,E.star];
  for(var i=0;i<usdCells.length;i++){
    (function(rc,d){
      setTimeout(function(){
        var tEl=gd.querySelector('[data-r="'+rc[0]+'"][data-c="'+rc[1]+'"]');if(!tEl)return;
        var tr2=tEl.getBoundingClientRect(),tx=tr2.left+tr2.width/2,ty=tr2.top+tr2.height/2;
        var p2=document.createElement('div');p2.textContent=emos[d%emos.length];p2.style.cssText='position:fixed;z-index:175;pointer-events:none;font-size:clamp(10px,3.5vw,16px);left:'+sx+'px;top:'+sy+'px;transform:translate(-50%,-50%)';document.body.appendChild(p2);
        var t0=null,dur2=252;
        (function anim(ts){
          if(!t0)t0=ts;var prog=Math.min((ts-t0)/dur2,1),ep=prog<0.5?2*prog*prog:1-Math.pow(-2*prog+2,2)/2;
          p2.style.left=(sx+(tx-sx)*ep)+'px';p2.style.top=(sy+(ty-sy)*ep-21*Math.sin(Math.PI*prog))+'px';p2.style.opacity=prog>0.75?(1-(prog-0.75)/0.25).toString():'1';p2.style.transform='translate(-50%,-50%) scale('+(1+0.4*Math.sin(Math.PI*prog))+')';
          if(prog<1)requestAnimationFrame(anim);
          else{if(p2.parentNode)p2.parentNode.removeChild(p2);if(tEl){tEl.style.outline='3px solid #ff69b4';tEl.style.filter='brightness(1.6) saturate(1.5)';var badge=document.createElement('div');badge.textContent='+20%';badge.style.cssText='position:absolute;top:-1px;left:50%;transform:translateX(-50%);font-size:clamp(6px,2vw,9px);font-weight:900;color:#ff69b4;white-space:nowrap;z-index:20;pointer-events:none';tEl.style.position='relative';tEl.appendChild(badge);setTimeout(function(){tEl.style.filter='';tEl.style.outline='';setTimeout(function(){if(badge.parentNode)badge.parentNode.removeChild(badge);},490);},126);}}
        }(performance.now()));
      },d);
    }(usdCells[i],56+i*63));
  }
  setTimeout(function(){render();cb();},56+usdCells.length*63+350);
}

function applyRedEffect(val,cb){

  if(!dEl||!wEl){G.win=Math.round((G.win+amt)*100)/100;updateWinDisplay(false);setTimeout(cb,210);return;}
  var dr2=dEl.getBoundingClientRect(),wr2=wEl.getBoundingClientRect();
  var sx=dr2.left+dr2.width/2,sy=dr2.top+dr2.height/2,ex=wr2.left+wr2.width/2,ey=wr2.top+wr2.height/2;
  var txt=document.createElement('div');txt.textContent='+$'+amt.toFixed(2);

  document.body.appendChild(txt);
  var t0=null,dur=210;

    txt.style.left=(sx+(ex-sx)*ep)+'px';txt.style.top=(sy+(ey-sy)*ep-27*Math.sin(Math.PI*p))+'px';txt.style.opacity=p>0.65?(1-(p-0.65)/0.35).toString():'1';
    if(p<1)requestAnimationFrame(anim);
    else{
      if(txt.parentNode)txt.parentNode.removeChild(txt);
      G.win=Math.round((G.win+amt)*100)/100;updateWinDisplay(false);
      wEl.classList.remove('win-flash');void wEl.offsetWidth;wEl.classList.add('win-flash');
      setTimeout(function(){wEl.classList.remove('win-flash');setTimeout(cb,42);},220);
    }
  }(performance.now()));
}

function doScatterSpin(){
  return new Promise(function(res){
    // 12 segments: x5 x4, x7 x3, x20 x2, x50 x2, x1000 x1
    var SEGS=[
      {label:'x5',  mult:5,    bg:'#4f46e5',fg:'#c7d2fe',special:false},
      {label:'x7',  mult:7,    bg:'#0e7490',fg:'#a5f3fc',special:false},
      {label:'x5',  mult:5,    bg:'#4f46e5',fg:'#c7d2fe',special:false},
      {label:'x20', mult:20,   bg:'#b45309',fg:'#fde68a',special:false},
      {label:'x7',  mult:7,    bg:'#0e7490',fg:'#a5f3fc',special:false},
      {label:'x5',  mult:5,    bg:'#4f46e5',fg:'#c7d2fe',special:false},
      {label:'x50', mult:50,   bg:'#be123c',fg:'#fecdd3',special:false},
      {label:'x7',  mult:7,    bg:'#0e7490',fg:'#a5f3fc',special:false},
      {label:'x5',  mult:5,    bg:'#4f46e5',fg:'#c7d2fe',special:false},
      {label:'x20', mult:20,   bg:'#b45309',fg:'#fde68a',special:false},
      {label:'x50', mult:50,   bg:'#be123c',fg:'#fecdd3',special:false},
      {label:'x1000',mult:1000,bg:'#000',   fg:'#ffd700',special:true },
    ];
    var N=SEGS.length, sliceAng=2*Math.PI/N;

    // Weighted random pick
    var WEIGHTS={5:0.40,7:0.30,20:0.14,50:0.10,1000:0.06};
    var r=Math.random(),cum=0,winnerMult=5;
    var wkeys=Object.keys(WEIGHTS);
    for(var i=0;i<wkeys.length;i++){cum+=WEIGHTS[wkeys[i]];if(r<cum){winnerMult=parseInt(wkeys[i]);break;}}

    // Find segment index matching winnerMult
    var winIdx=0;
    for(var i=0;i<N;i++){if(SEGS[i].mult===winnerMult){winIdx=i;break;}}
    var wa=Math.round(G.bet*winnerMult*100)/100;

    // Modal overlay
    var modal=document.createElement('div');
    modal.style.cssText='position:fixed;inset:0;z-index:160;background:rgba(5,0,20,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:all';

    var title=document.createElement('div');
    title.textContent='🔮 SCATTER BONUS';
    title.style.cssText='font-size:13px;font-weight:900;letter-spacing:3px;color:#fcd34d;text-shadow:0 0 12px rgba(252,211,77,.6)';

    // Canvas
    var SIZE=Math.min(window.innerWidth*0.72,290);
    var cvs=document.createElement('canvas');
    cvs.width=SIZE*2;cvs.height=SIZE*2;
    cvs.style.cssText='width:'+SIZE+'px;height:'+SIZE+'px;border-radius:50%;box-shadow:0 0 36px rgba(160,80,255,.55),0 0 0 4px rgba(255,200,0,.4)';
    var ctx2=cvs.getContext('2d');
    var CX=SIZE,CY=SIZE,RAD=SIZE-8;

    function drawWheel(angle,highlightIdx){
      ctx2.clearRect(0,0,SIZE*2,SIZE*2);
      for(var i=0;i<N;i++){
        var a0=angle+i*sliceAng,a1=a0+sliceAng;
        var seg=SEGS[i];
        var isHL=(highlightIdx===i);

        // Segment fill
        ctx2.beginPath();ctx2.moveTo(CX,CY);ctx2.arc(CX,CY,RAD,a0,a1);ctx2.closePath();

        if(seg.special){
          // x1000: rainbow gradient fill
          var grd=ctx2.createRadialGradient(CX,CY,0,CX,CY,RAD);
          grd.addColorStop(0,'#3b0764');
          grd.addColorStop(0.5,'#7c2d12');
          grd.addColorStop(1,'#1e1b4b');
          ctx2.fillStyle=isHL?'#fffbe6':grd;
        } else {
          ctx2.fillStyle=isHL?'#fff':seg.bg;
        }
        ctx2.fill();

        // Special x1000: gold outer arc glow
        if(seg.special && !isHL){
          ctx2.beginPath();ctx2.moveTo(CX,CY);ctx2.arc(CX,CY,RAD,a0,a1);ctx2.closePath();
          ctx2.strokeStyle='rgba(255,215,0,.9)';ctx2.lineWidth=4;ctx2.stroke();
          // Star decorations inside segment
          ctx2.save();ctx2.translate(CX,CY);ctx2.rotate(a0+sliceAng/2);
          ctx2.font=Math.round(SIZE*0.09)+'px Arial';
          ctx2.fillText('★',RAD*0.55,Math.round(SIZE*0.055));
          ctx2.restore();
        } else {
          ctx2.strokeStyle='rgba(255,255,255,.15)';ctx2.lineWidth=2;ctx2.stroke();
        }

        // Label text
        ctx2.save();ctx2.translate(CX,CY);ctx2.rotate(a0+sliceAng/2);
        var fontSize=seg.special?Math.round(SIZE*0.10):Math.round(SIZE*(seg.mult>=50?0.11:0.13));
        ctx2.font='900 '+fontSize+'px Arial';
        ctx2.textAlign='right';
        if(seg.special){
          // Gold glowing text for x1000
          ctx2.shadowColor='#ffd700';ctx2.shadowBlur=isHL?0:14;
          ctx2.fillStyle=isHL?seg.bg:'#ffd700';
        } else {
          ctx2.shadowColor=isHL?seg.bg:'transparent';ctx2.shadowBlur=isHL?8:0;
          ctx2.fillStyle=isHL?seg.bg:seg.fg;
        }
        ctx2.fillText(seg.label,RAD*0.84,Math.round(SIZE*0.05));
        ctx2.restore();
      }

      // Center hub
      ctx2.beginPath();ctx2.arc(CX,CY,SIZE*0.10,0,2*Math.PI);
      ctx2.fillStyle='#1e0848';ctx2.fill();
      ctx2.strokeStyle='rgba(255,200,0,.7)';ctx2.lineWidth=3;ctx2.stroke();
    }

    // Pointer
    var ptr=document.createElement('div');
    ptr.style.cssText='width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:24px solid #fcd34d;filter:drop-shadow(0 0 7px rgba(252,211,77,.9));margin-bottom:-7px;z-index:1';

    // Result
    var result=document.createElement('div');
    result.style.cssText='font-size:40px;font-weight:900;color:#ffd700;min-height:50px;letter-spacing:2px;text-shadow:0 0 20px rgba(255,215,0,.7);opacity:0;transition:opacity .35s';

    var msg=document.createElement('div');
    msg.style.cssText='font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px';
    msg.textContent='SPINNING...';

    modal.appendChild(title);modal.appendChild(ptr);modal.appendChild(cvs);
    modal.appendChild(result);modal.appendChild(msg);
    document.body.appendChild(modal);

    // Spin physics
    var baseAngle=0;
    var targetOffset=-Math.PI/2-winIdx*sliceAng-sliceAng/2;
    targetOffset+=(Math.random()*0.6+0.2)*sliceAng;
    var fullSpins=(4+Math.floor(Math.random()*3))*2*Math.PI;
    var totalRot=fullSpins+((targetOffset-baseAngle%(2*Math.PI)+4*Math.PI)%(2*Math.PI));
    var duration=3400,startTime=null;
    function easeOut(t){return 1-Math.pow(1-t,4);}

    function spinFrame(ts){
      if(!startTime)startTime=ts;
      var elapsed=ts-startTime,progress=Math.min(elapsed/duration,1);
      var current=baseAngle+totalRot*easeOut(progress);
      drawWheel(current,progress>0.97?winIdx:-1);
      if(progress<1){requestAnimationFrame(spinFrame);}
      else{
        drawWheel(current,winIdx);
        var isJackpot=(winnerMult===1000);
        result.textContent=isJackpot?'💰 JACKPOT! 💰':'+$'+wa.toFixed(2);
        result.style.opacity='1';
        if(isJackpot){
          result.style.fontSize='32px';
          result.style.color='#ffd700';
          result.style.textShadow='0 0 30px rgba(255,215,0,1),0 0 60px rgba(255,150,0,.8)';
          msg.innerHTML='<span style="color:#ffd700;font-weight:900;font-size:14px">x1000 — $'+wa.toFixed(2)+'!</span>';
        } else {
          msg.innerHTML='<span style="color:#6ee7b7;font-weight:900">'+winnerMult+'x — $'+wa.toFixed(2)+'!</span>';
        }
        G.win=Math.round((G.win+wa)*100)/100;
        updateWinDisplay(true);
        setTimeout(function(){if(modal.parentNode)modal.parentNode.removeChild(modal);res();},isJackpot?2600:1800);
      }
    }

    drawWheel(baseAngle,-1);
    setTimeout(function(){requestAnimationFrame(spinFrame);},400);
  });
}

function applyCandyEffect(ct,val,cb){
  if(ct==='cash_low'||ct==='cash_mid'||ct==='cash_high'){applyRedEffect(val||0.5,cb);return;}
  if(ct==='purple'){animatePurple(val||1.2,cb);return;}
  if(ct==='sweet'){applySweetEffect(cb);return;}
  if(ct==='scatter'){G.scatters++;updateScatterDisplay();if(G.scatters>=1){G.scatters=0;doScatterSpin().then(cb);return;}setTimeout(cb,245);return;}
  setTimeout(cb,126);
}

function doTumble(bs){
  return new Promise(function(res){
    var gd=document.getElementById('gd'),cells=Array.from(gd.querySelectorAll('.c'));
    var cellH=cells[0]?cells[0].offsetHeight+5:55;
    for(var i=0;i<cells.length;i++){var el=cells[i];if(bs[el.dataset.r+','+el.dataset.c]){el.style.transition='transform .13s ease-in,opacity .11s ease';el.style.transform='scale(0)';el.style.opacity='0';}}
    setTimeout(function(){
      var fallMap={};for(var col=0;col<GS;col++){var gaps=0;for(var row=GS-1;row>=0;row--){if(bs[row+','+col])gaps++;else if(gaps>0)fallMap[row+','+col]=gaps;}}
      for(var i=0;i<cells.length;i++){var el=cells[i],key=el.dataset.r+','+el.dataset.c;if(!bs[key]&&fallMap[key]){el.style.transition='transform .27s cubic-bezier(.25,0,.3,1.2)';el.style.transform='translateY('+(fallMap[key]*cellH)+'px)';}}
      setTimeout(function(){res(cellH);},294);
    },160);
  });
}

function doRefill(bpc,cellH){
  var gd=document.getElementById('gd'),cells=Array.from(gd.querySelectorAll('.c'));
  for(var i=0;i<cells.length;i++){var el=cells[i],r=parseInt(el.dataset.r),c=parseInt(el.dataset.c);if(bpc[c]>0&&r<bpc[c]){el.style.transition='none';el.style.transform='translateY('+(-bpc[c]*cellH)+'px)';el.style.opacity='0';}}
  gd.style.visibility='';void gd.offsetWidth;
  for(var i=0;i<cells.length;i++){var el=cells[i],r=parseInt(el.dataset.r),c=parseInt(el.dataset.c);if(bpc[c]>0&&r<bpc[c]){var d=r*15+c*3;el.style.transition='transform .22s cubic-bezier(.2,.8,.3,1.15) '+d+'ms,opacity .14s ease '+d+'ms';el.style.transform='translateY(0)';el.style.opacity='1';}}
  setTimeout(function(){for(var i=0;i<cells.length;i++){cells[i].style.transition='';cells[i].style.transform='';cells[i].style.opacity='';}},350);
}

function mainBtn(){if(G.phase==='idle'||G.phase==='gameover')startGame();else if(G.phase==='playing')cashOut();}

function startGame(){
  if(G.bal<G.bet){alert('Insufficient balance!');return;}
  G.bal-=G.bet;G.phase='playing';G.deer={r:DS.r,c:DS.c};G.win=0;G.scatters=0;G.sel=null;G.round=0;
  newGrid();buildReel();openDoor();render();ui();showMoveHint();
  var b=document.getElementById('btnM');b.textContent='CASH OUT';b.classList.add('co');
}

function onCell(r,c){
  if(G.phase!=='playing')return;
  hideMoveHint();
  var prevR=G.deer.r,prevC=G.deer.c;
  G.sel={r:r,c:c};G.phase='spinning';render();ui();

  var safeSym=[],killSym=[],sk,ii;
  for(ii=0;ii<SYM.length;ii++){var hits=false;for(sk=0;sk<SYM[ii].c.length;sk++){if(SYM[ii].c[sk][0]===r&&SYM[ii].c[sk][1]===c){hits=true;break;}}(hits?killSym:safeSym).push(ii);}
  var si;
  if(Math.random()<G.safeProb&&safeSym.length>0)si=safeSym[Math.floor(Math.random()*safeSym.length)];
  else if(killSym.length>0)si=killSym[Math.floor(Math.random()*killSym.length)];
  else si=safeSym[Math.floor(Math.random()*safeSym.length)];

  closeDoor();
  sleep(230).then(function(){
    openDoor();
    document.getElementById('gw').classList.add('spin-border');
    return Promise.all([
      spinReel(si),
      sleep(1085).then(function(){return animateDeer(prevR,prevC,r,c,315);})
    ]);
  }).then(function(){
    document.getElementById('gw').classList.remove('spin-border');
    G.grid[G.deer.r][G.deer.c].s='h';
    G.deer={r:r,c:c};G.grid[r][c].s='r';G.sel=null;render();

    var sym=SYM[si],bs={};
    for(var ki=0;ki<sym.c.length;ki++)bs[sym.c[ki][0]+','+sym.c[ki][1]]=1;
    var dB=!!bs[r+','+c];
    for(var ki=0;ki<sym.c.length;ki++){var br=sym.c[ki][0],bcc=sym.c[ki][1];if(G.grid[br][bcc].s==='h')G.grid[br][bcc].s='pb';}
    if(dB)G.grid[r][c].s='pb';
    render();

    sleep(480).then(function(){
      shakeScreen();
      var bl=sym.c.slice().sort(function(a,b){return a[0]-b[0]||a[1]-b[1];});
      if(dB)bl.push([r,c]);
      for(var bi=0;bi<bl.length;bi++){
        (function(rc2,delay){
          setTimeout(function(){
            var br2=rc2[0],bc2=rc2[1];
            if(G.grid[br2]&&G.grid[br2][bc2])G.grid[br2][bc2].s='b';
            var el=document.querySelector('#gd [data-r="'+br2+'"][data-c="'+bc2+'"]');
            if(el){el.className='c cb efx';el.dataset.r=br2;el.dataset.c=bc2;el.innerHTML='<span style="font-size:clamp(11px,4vw,20px)">'+E.explode+'</span>';}
          },delay);
        }(bl[bi],bi*27));
      }
      sleep(bl.length*27+210).then(function(){
        doTumble(bs).then(function(cellH){
          if(dB){
            render();endGame(false,0);
          } else {
            var ct=G.grid[r][c].ct,cv=G.grid[r][c].val;
            G.grid[r][c].ct='empty';G.grid[r][c].val=null;
            G.deer.r=getDeerNewRow(bs,r,c);
            var bpc=new Array(GS).fill(0),bsK=Object.keys(bs);
            for(var bki=0;bki<bsK.length;bki++)bpc[parseInt(bsK[bki].split(',')[1])]++;
            applyGravityToGrid(bs);G.grid[G.deer.r][G.deer.c].s='r';
            applyCandyEffect(ct,cv,function(){
              G.round++;G.phase='playing';showMoveHint();
              var gdEl=document.getElementById('gd');gdEl.style.visibility='hidden';
              render();ui();doRefill(bpc,cellH);
            });
          }
        });
      });
    });
  }).catch(function(){
    document.getElementById('gw').classList.remove('spin-border');
    G.phase='playing';render();ui();
  });
}

function cashOut(){
  if(G.phase!=='playing'||G.win<=0)return;
  var pay=G.win;G.bal=Math.round((G.bal+pay)*100)/100;endGame(true,pay);
}

var _resetT=null;
function endGame(won,pay){
  hideMoveHint();pay=pay||0;
  var ratio=won?Math.round(pay/G.bet*100)/100:0;
  G.hist.push(won?{t:'w',v:ratio}:{t:'b',v:0});if(G.hist.length>6)G.hist.shift();renderHist();
  if(!won){
    G.phase='idle';var b=document.getElementById('btnM');b.textContent='BET';b.classList.remove('co');b.disabled=false;
    closeDoorAfter(280);if(_resetT)clearTimeout(_resetT);
    _resetT=setTimeout(function(){if(G.phase!=='idle')return;G.deer={r:DS.r,c:DS.c};G.win=0;G.scatters=0;G.sel=null;newGrid();render();ui();_resetT=null;},980);
    return;
  }
  G.phase='gameover';
  document.getElementById('ovt').textContent='CASH OUT!';
  document.getElementById('ovs').textContent='$'+pay.toFixed(2)+' \u2014 x'+ratio+' bet';
  document.getElementById('ova').textContent='+$'+pay.toFixed(2);
  document.getElementById('ov').classList.add('show');
  var b=document.getElementById('btnM');b.textContent='BET';b.classList.remove('co');b.disabled=false;
  closeDoorAfter(630);ui();
}

function closeOv(){
  document.getElementById('ov').classList.remove('show');
  G.phase='idle';G.deer={r:DS.r,c:DS.c};G.win=0;G.scatters=0;G.sel=null;
  newGrid();render();ui();renderHist();
}

var STEPS=[0.5,1,2,5,10,20,50,100];
function adjB(d){if(G.phase!=='idle'&&G.phase!=='gameover')return;var best=0;for(var i=0;i<STEPS.length;i++)if(Math.abs(STEPS[i]-G.bet)<Math.abs(STEPS[best]-G.bet))best=i;G.bet=STEPS[Math.max(0,Math.min(STEPS.length-1,best+d))];ui();render();}
function qB(m){if(G.phase!=='idle'&&G.phase!=='gameover')return;var nb=G.bet*m,best=0;for(var i=0;i<STEPS.length;i++)if(Math.abs(STEPS[i]-nb)<Math.abs(STEPS[best]-nb))best=i;G.bet=STEPS[best];ui();render();}
function sB(v){if(G.phase!=='idle'&&G.phase!=='gameover')return;G.bet=v;ui();render();}

window.onload=function(){buildPips();newGrid();render();ui();renderHist();requestAnimationFrame(function(){requestAnimationFrame(function(){buildReel();});});};
</script>
